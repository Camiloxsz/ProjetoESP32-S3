[env:m5stack-stamps3]
platform = espressif32
board = m5stack-stamps3
framework = arduino

lib_deps = 
    marian-craciunescu/ESP32Ping
    witnessmenow/UniversalTelegramBot
    bblanchon/ArduinoJson

monitor_speed = 115200
upload_speed = 115200
build_flags = 
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1

; FIX DE PORTA LOCAL NO DEBIAN
upload_port = COM3
monitor_port = COM3